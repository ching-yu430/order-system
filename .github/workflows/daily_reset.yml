name: 每日自動重置工作 (榮 鹽水雞)

on:
  schedule:
    # 每天 UTC 時間 20:00 (即台灣時間凌晨 04:00) 定時執行
    - cron: '0 20 * * *'
  workflow_dispatch:
    # 支援在 GitHub 網頁後台手動觸發執行

jobs:
  reset-database:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出專案程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝依賴項目
      run: |
        python -m pip install --upgrade pip
        pip install firebase-admin

    - name: 執行重置與清理腳本
      env:
        # Firebase 服務帳戶私鑰（必填）
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        # Discord Webhook URL（用於清晨早安防忘提醒，直接填入 Discord Webhook 網址）
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        # 後台管理頁面網址（在 Discord 通知中提供一鍵跳轉連結）
        ADMIN_PAGE_URL: ${{ secrets.ADMIN_PAGE_URL }}
      run: |
        python scripts/daily_reset.py
